services:
  backend:
    build:
      context: ..
      dockerfile: infrastructure/docker/backend.Dockerfile
    working_dir: /workspace
    environment:
      AUTODEV_PROFILE: local
      DATABASE_URL: sqlite:////data/autodev.db
      LLM_PROVIDER: stub
      AUTODEV_JOB_BACKEND: "${AUTODEV_JOB_BACKEND:-inprocess}"
      AUTODEV_REDIS_URL: "${AUTODEV_REDIS_URL:-redis://redis:6379/0}"
      STORAGE_BACKEND: "${STORAGE_BACKEND:-local}"
      AUTODEV_ARTIFACT_DIR: /data/artifacts
      AUTODEV_MINIO_ENDPOINT: "${AUTODEV_MINIO_ENDPOINT:-minio:9000}"
      AUTODEV_MINIO_ACCESS_KEY: "${AUTODEV_MINIO_ACCESS_KEY:-}"
      AUTODEV_MINIO_SECRET_KEY: "${AUTODEV_MINIO_SECRET_KEY:-}"
      PYTEST_ADDOPTS: -p no:cacheprovider
      UVICORN_RELOAD: "false"
      AUTODEV_CONFIG_PATH: /data/autodev.config.json
      AUTODEV_PROJECT_ROOT: /workspace
      # Set a token to require Authorization: Bearer <token> on the API.
      AUTODEV_API_TOKEN: "${AUTODEV_API_TOKEN:-}"
    ports:
      - "8000:8000"
    volumes:
      - autodev_data:/data
      - ../backend:/workspace/backend
      - ../scripts:/workspace/scripts
      - ../tests:/workspace/tests
      - ../docs:/workspace/docs
      - ../infrastructure:/workspace/infrastructure
      - ../sandbox:/workspace/sandbox
      - ../Makefile:/workspace/Makefile:ro
      - ../mypy.ini:/workspace/mypy.ini:ro
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    pids_limit: 512

  backend-prod:
    profiles: ["prod"]
    build:
      context: ..
      dockerfile: infrastructure/docker/backend.Dockerfile
    working_dir: /workspace
    environment:
      AUTODEV_PROFILE: prod
      DATABASE_URL: postgresql://autodev:autodev@postgres:5432/autodev
      LLM_PROVIDER: stub
      AUTODEV_JOB_BACKEND: redis
      AUTODEV_REDIS_URL: redis://redis:6379/0
      STORAGE_BACKEND: s3
      AUTODEV_MINIO_ENDPOINT: minio:9000
      AUTODEV_MINIO_ACCESS_KEY: "${AUTODEV_MINIO_ACCESS_KEY:-minioadmin}"
      AUTODEV_MINIO_SECRET_KEY: "${AUTODEV_MINIO_SECRET_KEY:-minioadmin}"
      AUTODEV_CONFIG_PATH: /data/autodev.config.json
      AUTODEV_PROJECT_ROOT: /workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - autodev_data:/data
      - ../backend:/workspace/backend
      - ../scripts:/workspace/scripts
      - ../tests:/workspace/tests
      - ../docs:/workspace/docs
      - ../infrastructure:/workspace/infrastructure
      - ../sandbox:/workspace/sandbox
      - ../Makefile:/workspace/Makefile:ro
      - ../mypy.ini:/workspace/mypy.ini:ro
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    pids_limit: 512

  frontend:
    image: node:20
    # Part of the "full" profile so `make container-up` stays backend-only;
    # `make container-up-full` boots backend + frontend together.
    profiles: ["full"]
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ../frontend:/app
    environment:
      # Consumed by the user's browser (NEXT_PUBLIC_*), which reaches the
      # backend through the published host port — not the compose network —
      # so this stays localhost rather than the backend service name.
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    profiles: ["prod", "postgres"]
    environment:
      POSTGRES_DB: autodev
      POSTGRES_USER: autodev
      POSTGRES_PASSWORD: autodev
    ports:
      - "5432:5432"
    volumes:
      - autodev_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodev -d autodev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles: ["prod", "redis"]
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - autodev_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles: ["prod", "minio"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${AUTODEV_MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${AUTODEV_MINIO_SECRET_KEY:-minioadmin}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - autodev_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  autodev_data:
  autodev_postgres:
  autodev_redis:
  autodev_minio:
