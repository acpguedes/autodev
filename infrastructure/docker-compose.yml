services:
  backend:
    build:
      context: ..
      dockerfile: infrastructure/docker/backend.Dockerfile
    working_dir: /workspace
    environment:
      AUTODEV_PROFILE: local
      DATABASE_URL: sqlite:////data/autodev.db
      LLM_PROVIDER: stub
      UVICORN_RELOAD: "false"
      AUTODEV_CONFIG_PATH: /data/autodev.config.json
      AUTODEV_PROJECT_ROOT: /workspace
      # Set a token to require Authorization: Bearer <token> on the API.
      AUTODEV_API_TOKEN: "${AUTODEV_API_TOKEN:-}"
    ports:
      - "8000:8000"
    volumes:
      - autodev_data:/data
      - ../backend:/workspace/backend
      - ../tests:/workspace/tests
      - ../docs:/workspace/docs
      - ../infrastructure:/workspace/infrastructure
      - ../sandbox:/workspace/sandbox
      - ../Makefile:/workspace/Makefile:ro
      - ../mypy.ini:/workspace/mypy.ini:ro
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    pids_limit: 512

  frontend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ../frontend:/app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  autodev_data:
