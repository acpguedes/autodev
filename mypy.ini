[mypy]
python_version = 3.11
warn_return_any = False
warn_unused_ignores = False

# Optional runtime dependencies — not installed in dev venv
[mypy-tree_sitter.*]
ignore_missing_imports = True

[mypy-tree_sitter]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-opentelemetry.*]
ignore_missing_imports = True
