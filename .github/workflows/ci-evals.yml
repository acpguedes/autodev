name: CI Evals

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  reference-eval-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run the reference eval offline and gate on the result
        run: |
          set -euo pipefail
          python -m backend.cli eval run evals/reference/agent_smoke/eval.yaml | tee eval_result.json

      - name: Upload eval result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reference-eval-result
          path: eval_result.json
          retention-days: 14
          if-no-files-found: warn
