name: CI Backend

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          # Pin to the versions `make check-backend` runs locally: unpinned
          # ruff/mypy pull newer defaults (e.g. B008 on FastAPI Depends()) and
          # the gate would diverge from what contributors see.
          python -m pip install "ruff==0.15.18" "mypy==2.1.0"

      - name: Lint (ruff)
        run: python -m ruff check backend tests

      - name: Typecheck (mypy)
        run: python -m mypy backend

  patch-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Patch-validation gate (dry-run + path-traversal guard)
        run: python scripts/validate_patches.py

  security-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run secret scanning
        run: python scripts/run_secret_scanning.py .

      - name: Run critical-CVE scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          timeout: 3m

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run backend test suite with coverage gate
        run: |
          python -m pytest tests backend/tests -q \
            --cov=backend --cov-report=term-missing --cov-report=xml:coverage.xml \
            --cov-fail-under=85

      - name: Publish coverage summary
        if: always()
        run: |
          python scripts/ci_coverage_summary.py --coverage-xml coverage.xml --out coverage_summary.md --gate 85
          cat coverage_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: |
            coverage.xml
            coverage_summary.md
          retention-days: 14
          if-no-files-found: warn
