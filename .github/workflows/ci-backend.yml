name: CI Backend

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  security-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run secret scanning
        run: python scripts/run_secret_scanning.py .

      - name: Run critical-CVE scan
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          timeout: 3m

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run backend test suite with coverage gate
        run: python -m pytest tests backend/tests -q --cov=backend --cov-report=term-missing --cov-fail-under=60

  smoke-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Start backend
        run: python -m uvicorn backend.api.main:app --port 8000 &

      - name: Wait for backend
        run: until curl -sf http://localhost:8000/health; do sleep 1; done
        timeout-minutes: 1

      - name: Check /health returns 200
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          echo "Health status: $status"
          [ "$status" = "200" ]

      - name: Kill backend
        if: always()
        run: pkill -f "uvicorn backend.api.main" || true
